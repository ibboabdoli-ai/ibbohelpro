name: Live smoke

on:
  workflow_dispatch:
    inputs:
      prod_url:
        description: Production URL to test
        required: false
        default: https://ibbohelpro.vercel.app

jobs:
  live-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run live smoke test
        run: npm run test:live-smoke
        env:
          PROD_URL: ${{ github.event.inputs.prod_url }}
